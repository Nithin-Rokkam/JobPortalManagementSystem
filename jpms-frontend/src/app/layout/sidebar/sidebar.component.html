<aside class="celestial-sidebar" [class.collapsed]="collapsed">

  <!-- Logo at top of sidebar — clicking goes to role dashboard -->
  <div class="sidebar-logo" [routerLink]="dashboardRoute" style="cursor: pointer;">
    <img src="https://res.cloudinary.com/dq4e4wh8x/image/upload/v1777353013/Joblix_image_ehuhua.png"
         alt="Joblix" class="sidebar-logo__img" width="32" height="32" />
    <span class="sidebar-logo__text nav-label">JOBLIX</span>
  </div>

  <div class="sidebar-nav" *ngIf="role">
    
    <!-- Dashboard -->
    <a [routerLink]="['/', role.toLowerCase(), 'dashboard']" routerLinkActive="active" class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7"></rect>
        <rect x="14" y="3" width="7" height="7"></rect>
        <rect x="14" y="14" width="7" height="7"></rect>
        <rect x="3" y="14" width="7" height="7"></rect>
      </svg>
      <span class="nav-label">Dashboard</span>
    </a>

    <!-- Profile — role-aware route -->
    <a [routerLink]="profileRoute" routerLinkActive="active" class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </svg>
      <span class="nav-label">Profile</span>
    </a>

    <!-- Role Specific Links -->
    <ng-container *ngIf="role === 'JOB_SEEKER'">
      <a routerLink="/seeker/applications" routerLinkActive="active" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
        </svg>
        <span class="nav-label">My Applications</span>
      </a>
      <a routerLink="/seeker/saved-jobs" routerLinkActive="active" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
        </svg>
        <span class="nav-label">Saved Jobs</span>
      </a>
    </ng-container>

    <ng-container *ngIf="role === 'RECRUITER'">
      <a routerLink="/recruiter/my-jobs" [routerLinkActiveOptions]="{exact: true}" routerLinkActive="active" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
          <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
        </svg>
        <span class="nav-label">Manage Jobs</span>
      </a>
      <a routerLink="/recruiter/all-applicants" routerLinkActive="active" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
          <circle cx="9" cy="7" r="4"></circle>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
        </svg>
        <span class="nav-label">All Applicants</span>
      </a>
    </ng-container>

  </div>

  <div class="sidebar-footer">
    <button (click)="logout()" class="nav-item text-danger" style="width: 100%; justify-content: flex-start; padding: 0.75rem 1rem; border: none; background: transparent; cursor: pointer;">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="#FF4560" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
      <span class="nav-label" style="color: #FF4560;">Sign Out</span>
    </button>
    <button (click)="toggleCollapse.emit()" class="collapse-btn">
      <svg *ngIf="!collapsed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="11 17 6 12 11 7"></polyline>
        <polyline points="18 17 13 12 18 7"></polyline>
      </svg>
      <svg *ngIf="collapsed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="13 17 18 12 13 7"></polyline>
        <polyline points="6 17 11 12 6 7"></polyline>
      </svg>
    </button>
  </div>

</aside>
