<div class="centered-container animate-fade-in-up">
  <div class="celestial-card inner-glow" style="max-width: 480px; width: 100%; padding: 2rem;">
    
    <!-- Logo/Icon -->
    <div style="display: flex; justify-content: center; margin-bottom: 1.5rem;">
      <div style="background: var(--bg-surface); border: 1px solid var(--glass-border); padding: 0.75rem; border-radius: 12px;">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--royal-blue)" stroke-width="2">
          <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
          <circle cx="8.5" cy="7" r="4"></circle>
          <line x1="20" y1="8" x2="20" y2="14"></line>
          <line x1="23" y1="11" x2="17" y2="11"></line>
        </svg>
      </div>
    </div>

    <!-- Header -->
    <div style="text-align: center; margin-bottom: 1.5rem;">
      <h1 class="heading-celestial" style="font-size: 1.5rem; margin-bottom: 0.5rem;">Create Account</h1>
      <p style="color: var(--text-secondary); font-size: 0.875rem;">Join our professional ecosystem.</p>
    </div>

    <!-- Form -->
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      
      <!-- Role Selector -->
      <div class="form-group" style="margin-bottom: 1.5rem;">
        <label class="label-celestial">I am a</label>
        <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">
          <button 
            type="button" 
            class="form-input" 
            style="flex: 1; padding: 0.5rem; border-radius: 8px; font-weight: 700; font-size: 0.875rem;"
            [style.background]="form.get('role')?.value === 'JOB_SEEKER' ? 'var(--royal-blue)' : 'var(--bg-surface)'"
            [style.color]="form.get('role')?.value === 'JOB_SEEKER' ? 'white' : 'var(--text-secondary)'"
            [style.border-color]="form.get('role')?.value === 'JOB_SEEKER' ? 'var(--royal-blue)' : 'var(--glass-border)'"
            (click)="selectRole('JOB_SEEKER')"
          >
            Job Seeker
          </button>
          <button 
            type="button" 
            class="form-input" 
            style="flex: 1; padding: 0.5rem; border-radius: 8px; font-weight: 700; font-size: 0.875rem;"
            [style.background]="form.get('role')?.value === 'RECRUITER' ? 'var(--royal-blue)' : 'var(--bg-surface)'"
            [style.color]="form.get('role')?.value === 'RECRUITER' ? 'white' : 'var(--text-secondary)'"
            [style.border-color]="form.get('role')?.value === 'RECRUITER' ? 'var(--royal-blue)' : 'var(--glass-border)'"
            (click)="selectRole('RECRUITER')"
          >
            Recruiter
          </button>
        </div>
        <span class="error-text" *ngIf="form.get('role')?.touched && form.get('role')?.invalid">Please select a role</span>
      </div>

      <!-- Full Name -->
      <div class="form-group">
        <label class="label-celestial">Full Name</label>
        <input 
          type="text" 
          formControlName="name" 
          placeholder="Full Name"
          class="form-input"
          [class.error]="form.get('name')?.touched && form.get('name')?.invalid"
        />
        <span class="error-text" *ngIf="form.get('name')?.touched && form.get('name')?.errors?.['required']">Name is required</span>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label class="label-celestial">Email Address</label>
        <input 
          type="email" 
          formControlName="email" 
          placeholder="you@example.com"
          class="form-input"
          [class.error]="form.get('email')?.touched && form.get('email')?.invalid"
        />
        <span class="error-text" *ngIf="form.get('email')?.touched && form.get('email')?.invalid">Enter a valid email</span>
      </div>

      <!-- Phone -->
      <div class="form-group">
        <label class="label-celestial">Phone Number (Optional)</label>
        <input 
          type="tel" 
          formControlName="phone" 
          placeholder="1234567890"
          class="form-input"
        />
      </div>

      <!-- Company Name (Recruiter only) -->
      <div class="form-group" *ngIf="isRecruiter">
        <label class="label-celestial">Company Name *</label>
        <input
          type="text"
          formControlName="companyName"
          placeholder="e.g. Acme Technologies"
          class="form-input"
          [class.error]="form.get('companyName')?.touched && form.get('companyName')?.invalid"
        />
        <span class="error-text" *ngIf="form.get('companyName')?.touched && form.get('companyName')?.errors?.['required']">Company name is required</span>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="label-celestial">Password</label>
        <input 
          type="password" 
          formControlName="password" 
          placeholder="••••••••"
          class="form-input"
          [class.error]="form.get('password')?.touched && form.get('password')?.invalid"
        />
        <span class="error-text" *ngIf="form.get('password')?.touched && form.get('password')?.invalid">Min 8 characters required</span>
      </div>

      <!-- Submit Button -->
      <button 
        type="submit" 
        class="btn-celestial" 
        style="width: 100%; margin-top: 1rem;"
        [disabled]="loading"
      >
        <span *ngIf="!loading">Create Account</span>
        <span *ngIf="loading">Processing...</span>
      </button>

    </form>

    <!-- Footer Link -->
    <div style="margin-top: 2rem; text-align: center; font-size: 0.875rem; color: var(--text-secondary);">
      Already have an account? 
      <a routerLink="/auth/login" style="color: var(--royal-blue); text-decoration: none; font-weight: 700;">Sign In</a>
    </div>

  </div>
</div>
